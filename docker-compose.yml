version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: private-docs-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./storage:/var/www/storage
    networks:
      - private-docs

  webserver:
    image: nginx:alpine
    container_name: private-docs-webserver
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - private-docs

  db:
    image: mysql:8.0
    container_name: private-docs-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: private_docs
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - private-docs

volumes:
  dbdata:
    driver: local

networks:
  private-docs:
    driver: bridge